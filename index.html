<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTIWARS - 20 Game Multiplayer Hub</title>
    <style>
        /* ==========================================================================
           MULTIWARS GLOBAL STYLES
           ========================================================================== */
        :root {
            --bg-color: #111;
            --text-color: #eee;
            --primary-color: #ff0055;
            --secondary-color: #00ffff;
            --font-family: 'Courier New', Courier, monospace;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        /* HEADER AND TYPOGRAPHY */
        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--secondary-color);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 10px var(--primary-color); }
            50% { text-shadow: 0 0 20px var(--secondary-color), 0 0 30px var(--primary-color); }
            100% { text-shadow: 0 0 10px var(--primary-color); }
        }

        /* MAIN MENU GRID */
        #menu-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 1200px;
            height: 70vh;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: inset 0 0 20px #000;
        }

        .game-card {
            background: #222;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
        }

        .game-card:hover {
            border-color: var(--secondary-color);
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--secondary-color);
        }

        .game-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        /* GAME CONTAINER */
        #game-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            background: #000;
            border: 4px solid #fff;
            box-shadow: 0 0 20px #fff;
            max-width: 100%;
            max-height: 80vh;
        }

        .controls-info {
            margin-top: 20px;
            display: flex;
            gap: 50px;
            font-size: 1.2rem;
        }

        .p1-controls { color: var(--primary-color); }
        .p2-controls { color: var(--secondary-color); }

        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            background: #333;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            font-family: var(--font-family);
            transition: all 0.2s;
        }

        #back-btn:hover {
            background: #fff;
            color: #000;
        }

        #score-board {
            position: absolute;
            top: 20px;
            font-size: 2rem;
            font-weight: bold;
            display: flex;
            gap: 100px;
        }

        /* OVERLAY NOTIFICATIONS */
        #notification {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #000;
            display: none;
            z-index: 100;
            text-align: center;
        }
        
        /* SCROLLBAR CUSTOMIZATION */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #111; 
        }
        ::-webkit-scrollbar-thumb {
            background: #555; 
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color); 
        }
    </style>
</head>
<body>

    <h1 id="main-title">MULTIWARS</h1>

    <div id="menu-container">
        </div>

    <div id="game-container">
        <button id="back-btn">RETURN TO HUB</button>
        <div id="score-board">
            <span class="p1-controls" id="p1-score">P1: 0</span>
            <span class="p2-controls" id="p2-score">P2: 0</span>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="controls-info" id="controls-display">
            <div class="p1-controls" id="p1-text">P1: WASD</div>
            <div class="p2-controls" id="p2-text">P2: ARROWS</div>
        </div>
        <div id="notification">PLAYER 1 WINS!</div>
    </div>

    <script>
        /* ==========================================================================
           MULTIWARS CORE ENGINE & DATA
           ========================================================================== */
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menuContainer = document.getElementById('menu-container');
        const gameContainer = document.getElementById('game-container');
        const mainTitle = document.getElementById('main-title');
        const backBtn = document.getElementById('back-btn');
        const notification = document.getElementById('notification');
        
        const p1ScoreEl = document.getElementById('p1-score');
        const p2ScoreEl = document.getElementById('p2-score');
        const p1TextEl = document.getElementById('p1-text');
        const p2TextEl = document.getElementById('p2-text');

        let currentAnimation = null;
        let activeGame = null;
        let keys = {};

        // Input Tracking
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // Core Game Class
        class Engine {
            constructor() {
                this.p1Score = 0;
                this.p2Score = 0;
                this.gameOver = false;
                this.width = canvas.width;
                this.height = canvas.height;
            }
            start() {}
            update() {}
            draw() {}
            reset() { this.gameOver = false; }
            endGame(winnerMsg) {
                this.gameOver = true;
                notification.innerHTML = winnerMsg;
                notification.style.display = 'block';
                setTimeout(() => {
                    notification.style.display = 'none';
                    this.reset();
                }, 3000);
                updateScores(this.p1Score, this.p2Score);
            }
        }

        function updateScores(p1, p2) {
            p1ScoreEl.innerText = `P1: ${p1}`;
            p2ScoreEl.innerText = `P2: ${p2}`;
        }

        // Game Loop
        function gameLoop() {
            if (activeGame) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (!activeGame.gameOver) {
                    activeGame.update();
                }
                activeGame.draw();
                currentAnimation = requestAnimationFrame(gameLoop);
            }
        }

        /* ==========================================================================
           GAME 1: PONG DUEL
           ========================================================================== */
        class Pong extends Engine {
            constructor() {
                super();
                this.p1Text = "P1: W/S";
                this.p2Text = "P2: UP/DOWN";
            }
            start() {
                this.padW = 20; this.padH = 100;
                this.p1Y = this.height/2 - this.padH/2;
                this.p2Y = this.height/2 - this.padH/2;
                this.ball = { x: this.width/2, y: this.height/2, vx: 5, vy: 5, r: 10 };
                this.speed = 8;
            }
            reset() {
                super.reset();
                this.ball = { x: this.width/2, y: this.height/2, vx: 5 * (Math.random()>0.5?1:-1), vy: 5, r: 10 };
            }
            update() {
                if (keys['KeyW'] && this.p1Y > 0) this.p1Y -= this.speed;
                if (keys['KeyS'] && this.p1Y < this.height - this.padH) this.p1Y += this.speed;
                if (keys['ArrowUp'] && this.p2Y > 0) this.p2Y -= this.speed;
                if (keys['ArrowDown'] && this.p2Y < this.height - this.padH) this.p2Y += this.speed;

                this.ball.x += this.ball.vx;
                this.ball.y += this.ball.vy;

                if (this.ball.y - this.ball.r < 0 || this.ball.y + this.ball.r > this.height) this.ball.vy *= -1;

                // Collision
                if (this.ball.x - this.ball.r < 30 && this.ball.y > this.p1Y && this.ball.y < this.p1Y + this.padH) {
                    this.ball.vx *= -1; this.ball.x = 30 + this.ball.r;
                }
                if (this.ball.x + this.ball.r > this.width - 30 && this.ball.y > this.p2Y && this.ball.y < this.p2Y + this.padH) {
                    this.ball.vx *= -1; this.ball.x = this.width - 30 - this.ball.r;
                }

                // Score
                if (this.ball.x < 0) { this.p2Score++; this.endGame("P2 SCORES!"); }
                if (this.ball.x > this.width) { this.p1Score++; this.endGame("P1 SCORES!"); }
            }
            draw() {
                ctx.fillStyle = '#fff';
                ctx.fillRect(10, this.p1Y, this.padW, this.padH);
                ctx.fillRect(this.width - 30, this.p2Y, this.padW, this.padH);
                ctx.beginPath();
                ctx.arc(this.ball.x, this.ball.y, this.ball.r, 0, Math.PI*2);
                ctx.fill();
                // Net
                for(let i=0; i<this.height; i+=40) ctx.fillRect(this.width/2 - 2, i, 4, 20);
            }
        }

        /* ==========================================================================
           GAME 2: TRON LIGHTCYCLES
           ========================================================================== */
        class Tron extends Engine {
            constructor() {
                super();
                this.p1Text = "P1: WASD";
                this.p2Text = "P2: ARROWS";
                this.gridSize = 10;
            }
            start() {
                this.reset();
            }
            reset() {
                super.reset();
                this.p1 = { x: 100, y: this.height/2, vx: this.gridSize, vy: 0, trail: [] };
                this.p2 = { x: this.width - 100, y: this.height/2, vx: -this.gridSize, vy: 0, trail: [] };
                this.grid = Array(this.width/this.gridSize).fill().map(()=>Array(this.height/this.gridSize).fill(0));
            }
            update() {
                // P1 Controls
                if (keys['KeyW'] && this.p1.vy === 0) { this.p1.vx = 0; this.p1.vy = -this.gridSize; }
                if (keys['KeyS'] && this.p1.vy === 0) { this.p1.vx = 0; this.p1.vy = this.gridSize; }
                if (keys['KeyA'] && this.p1.vx === 0) { this.p1.vx = -this.gridSize; this.p1.vy = 0; }
                if (keys['KeyD'] && this.p1.vx === 0) { this.p1.vx = this.gridSize; this.p1.vy = 0; }
                
                // P2 Controls
                if (keys['ArrowUp'] && this.p2.vy === 0) { this.p2.vx = 0; this.p2.vy = -this.gridSize; }
                if (keys['ArrowDown'] && this.p2.vy === 0) { this.p2.vx = 0; this.p2.vy = this.gridSize; }
                if (keys['ArrowLeft'] && this.p2.vx === 0) { this.p2.vx = -this.gridSize; this.p2.vy = 0; }
                if (keys['ArrowRight'] && this.p2.vx === 0) { this.p2.vx = this.gridSize; this.p2.vy = 0; }

                this.p1.trail.push({x: this.p1.x, y: this.p1.y});
                this.p2.trail.push({x: this.p2.x, y: this.p2.y});

                this.p1.x += this.p1.vx; this.p1.y += this.p1.vy;
                this.p2.x += this.p2.vx; this.p2.y += this.p2.vy;

                let p1Death = this.checkCollision(this.p1);
                let p2Death = this.checkCollision(this.p2);

                if (p1Death && p2Death) { this.endGame("DRAW!"); }
                else if (p1Death) { this.p2Score++; this.endGame("P2 WINS!"); }
                else if (p2Death) { this.p1Score++; this.endGame("P1 WINS!"); }
                else {
                    if(this.p1.x >= 0 && this.p1.x < this.width && this.p1.y >= 0 && this.p1.y < this.height)
                        this.grid[this.p1.x/this.gridSize][this.p1.y/this.gridSize] = 1;
                    if(this.p2.x >= 0 && this.p2.x < this.width && this.p2.y >= 0 && this.p2.y < this.height)
                        this.grid[this.p2.x/this.gridSize][this.p2.y/this.gridSize] = 2;
                }
            }
            checkCollision(p) {
                if (p.x < 0 || p.x >= this.width || p.y < 0 || p.y >= this.height) return true;
                if (this.grid[p.x/this.gridSize][p.y/this.gridSize] !== 0) return true;
                return false;
            }
            draw() {
                ctx.fillStyle = '#ff0055';
                this.p1.trail.forEach(t => ctx.fillRect(t.x, t.y, this.gridSize, this.gridSize));
                ctx.fillStyle = '#00ffff';
                this.p2.trail.forEach(t => ctx.fillRect(t.x, t.y, this.gridSize, this.gridSize));
                
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.p1.x, this.p1.y, this.gridSize, this.gridSize);
                ctx.fillRect(this.p2.x, this.p2.y, this.gridSize, this.gridSize);
            }
        }

        /* ==========================================================================
           GAME 3: TANK BATTLE
           ========================================================================== */
        class TankBattle extends Engine {
            constructor() {
                super();
                this.p1Text = "P1: WASD to Move, SPACE to Shoot";
                this.p2Text = "P2: ARROWS to Move, ENTER to Shoot";
                this.bullets = [];
            }
            start() { this.reset(); }
            reset() {
                super.reset();
                this.p1 = { x: 100, y: this.height/2, angle: 0, speed: 3, reload: 0 };
                this.p2 = { x: this.width - 100, y: this.height/2, angle: Math.PI, speed: 3, reload: 0 };
                this.bullets = [];
            }
            update() {
                // P1 Movement
                if (keys['KeyA']) this.p1.angle -= 0.05;
                if (keys['KeyD']) this.p1.angle += 0.05;
                if (keys['KeyW']) { this.p1.x += Math.cos(this.p1.angle)*this.p1.speed; this.p1.y += Math.sin(this.p1.angle)*this.p1.speed; }
                if (keys['KeyS']) { this.p1.x -= Math.cos(this.p1.angle)*this.p1.speed; this.p1.y -= Math.sin(this.p1.angle)*this.p1.speed; }
                
                // P2 Movement
                if (keys['ArrowLeft']) this.p2.angle -= 0.05;
                if (keys['ArrowRight']) this.p2.angle += 0.05;
                if (keys['ArrowUp']) { this.p2.x += Math.cos(this.p2.angle)*this.p2.speed; this.p2.y += Math.sin(this.p2.angle)*this.p2.speed; }
                if (keys['ArrowDown']) { this.p2.x -= Math.cos(this.p2.angle)*this.p2.speed; this.p2.y -= Math.sin(this.p2.angle)*this.p2.speed; }

                // Shooting
                if (this.p1.reload > 0) this.p1.reload--;
                if (keys['Space'] && this.p1.reload === 0) {
                    this.bullets.push({x: this.p1.x, y: this.p1.y, vx: Math.cos(this.p1.angle)*10, vy: Math.sin(this.p1.angle)*10, owner: 1});
                    this.p1.reload = 30;
                }
                if (this.p2.reload > 0) this.p2.reload--;
                if (keys['Enter'] && this.p2.reload === 0) {
                    this.bullets.push({x: this.p2.x, y: this.p2.y, vx: Math.cos(this.p2.angle)*10, vy: Math.sin(this.p2.angle)*10, owner: 2});
                    this.p2.reload = 30;
                }

                // Bullet update
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    let b = this.bullets[i];
                    b.x += b.vx; b.y += b.vy;
                    
                    // Boundary check
                    if (b.x < 0 || b.x > this.width || b.y < 0 || b.y > this.height) {
                        this.bullets.splice(i, 1); continue;
                    }

                    // Hit check
                    if (b.owner === 2 && Math.hypot(b.x - this.p1.x, b.y - this.p1.y) < 20) {
                        this.p2Score++; this.endGame("P2 WINS ROUND!");
                    }
                    if (b.owner === 1 && Math.hypot(b.x - this.p2.x, b.y - this.p2.y) < 20) {
                        this.p1Score++; this.endGame("P1 WINS ROUND!");
                    }
                }
                
                // Bounds
                this.p1.x = Math.max(20, Math.min(this.width-20, this.p1.x));
                this.p1.y = Math.max(20, Math.min(this.height-20, this.p1.y));
                this.p2.x = Math.max(20, Math.min(this.width-20, this.p2.x));
                this.p2.y = Math.max(20, Math.min(this.height-20, this.p2.y));
            }
            drawTank(x, y, angle, color) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                ctx.fillStyle = color;
                ctx.fillRect(-15, -15, 30, 30);
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, -5, 25, 10);
                ctx.restore();
            }
            draw() {
                this.drawTank(this.p1.x, this.p1.y, this.p1.angle, '#ff0055');
                this.drawTank(this.p2.x, this.p2.y, this.p2.angle, '#00ffff');
                ctx.fillStyle = '#fff';
                this.bullets.forEach(b => {
                    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
                });
            }
        }

        /* ==========================================================================
           GAME 4: TUG OF WAR
           ========================================================================== */
        class TugOfWar extends Engine {
            constructor() {
                super();
                this.p1Text = "P1: MASH 'A'";
                this.p2Text = "P2: MASH 'L'";
                this.ropePos = this.width / 2;
                this.p1Mashed = false;
                this.p2Mashed = false;
            }
            start() { this.reset(); }
            reset() { super.reset(); this.ropePos = this.width / 2; }
            update() {
                if (keys['KeyA'] && !this.p1Mashed) { this.ropePos -= 10; this.p1Mashed = true; }
                if (!keys['KeyA']) this.p1Mashed = false;
                
                if (keys['KeyL'] && !this.p2Mashed) { this.ropePos += 10; this.p2Mashed = true; }
                if (!keys['KeyL']) this.p2Mashed = false;

                if (this.ropePos < 100) { this.p1Score++; this.endGame("P1 WINS!"); }
                if (this.ropePos > this.width - 100) { this.p2Score++; this.endGame("P2 WINS!"); }
            }
            draw() {
                ctx.fillStyle = '#444';
                ctx.fillRect(100, this.height/2 - 5, this.width - 200, 10);
                ctx.fillStyle = '#ff0055';
                ctx.fillRect(0, 0, 100, this.height);
                ctx.fillStyle = '#00ffff';
                ctx.fillRect(this.width-100, 0, 100, this.height);
                
                // Flag
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.ropePos - 10, this.height/2 - 30, 20, 60);
            }
        }

        /* ==========================================================================
           GAME 5: SNAKE DUEL
           ========================================================================== */
        class SnakeDuel extends Engine {
            constructor() {
                super();
                this.p1Text = "P1: WASD";
                this.p2Text = "P2: ARROWS";
                this.grid = 20;
                this.ticks = 0;
            }
            start() { this.reset(); }
            reset() {
                super.reset();
                this.p1 = { body: [{x: 100, y: 300}], vx: this.grid, vy: 0, grow: 0 };
                this.p2 = { body: [{x: 700, y: 300}], vx: -this.grid, vy: 0, grow: 0 };
                this.food = this.spawnFood();
                this.ticks = 0;
            }
            spawnFood() {
                return {
                    x: Math.floor(Math.random() * (this.width/this.grid)) * this.grid,
                    y: Math.floor(Math.random() * (this.height/this.grid)) * this.grid
                };
            }
            update() {
                if (keys['KeyW'] && this.p1.vy === 0) { this.p1.vx = 0; this.p1.vy = -this.grid; }
                if (keys['KeyS'] && this.p1.vy === 0) { this.p1.vx = 0; this.p1.vy = this.grid; }
                if (keys['KeyA'] && this.p1.vx === 0) { this.p1.vx = -this.grid; this.p1.vy = 0; }
                if (keys['KeyD'] && this.p1.vx === 0) { this.p1.vx = this.grid; this.p1.vy = 0; }
                
                if (keys['ArrowUp'] && this.p2.vy === 0) { this.p2.vx = 0; this.p2.vy = -this.grid; }
                if (keys['ArrowDown'] && this.p2.vy === 0) { this.p2.vx = 0; this.p2.vy = this.grid; }
                if (keys['ArrowLeft'] && this.p2.vx === 0) { this.p2.vx = -this.grid; this.p2.vy = 0; }
                if (keys['ArrowRight'] && this.p2.vx === 0) { this.p2.vx = this.grid; this.p2.vy = 0; }

                this.ticks++;
                if (this.ticks < 5) return;
                this.ticks = 0;

                this.moveSnake(this.p1);
                this.moveSnake(this.p2);

                // Food check
                if (this.p1.body[0].x === this.food.x && this.p1.body[0].y === this.food.y) { this.p1.grow += 2; this.food = this.spawnFood(); }
                if (this.p2.body[0].x === this.food.x && this.p2.body[0].y === this.food.y) { this.p2.grow += 2; this.food = this.spawnFood(); }

                let p1Dead = this.checkDeath(this.p1, this.p2);
                let p2Dead = this.checkDeath(this.p2, this.p1);

                if (p1Dead && p2Dead) this.endGame("DRAW!");
                else if (p1Dead) { this.p2Score++; this.endGame("P2 WINS!"); }
                else if (p2Dead) { this.p1Score++; this.endGame("P1 WINS!"); }
            }
            moveSnake(p) {
                let head = { x: p.body[0].x + p.vx, y: p.body[0].y + p.vy };
                p.body.unshift(head);
                if (p.grow > 0) p.grow--;
                else p.body.pop();
            }
            checkDeath(p, other) {
                let head = p.body[0];
                if (head.x < 0 || head.x >= this.width || head.y < 0 || head.y >= this.height) return true;
                for (let i = 1; i < p.body.length; i++) if (head.x === p.body[i].x && head.y === p.body[i].y) return true;
                for (let i = 0; i < other.body.length; i++) if (head.x === other.body[i].x && head.y === other.body[i].y) return true;
                return false;
            }
            draw() {
                ctx.fillStyle = '#0f0';
                ctx.fillRect(this.food.x, this.food.y, this.grid, this.grid);
                
                ctx.fillStyle = '#ff0055';
                this.p1.body.forEach(b => ctx.fillRect(b.x, b.y, this.grid-1, this.grid-1));
                
                ctx.fillStyle = '#00ffff';
                this.p2.body.forEach(b => ctx.fillRect(b.x, b.y, this.grid-1, this.grid-1));
            }
        }

        /* ==========================================================================
           GAME 6: REACTION TESTER
           ========================================================================== */
        class ReactionTester extends Engine {
            constructor() {
                super();
                this.p1Text = "P1: PRESS 'Q'";
                this.p2Text = "P2: PRESS 'P'";
                this.state = 'WAIT'; 
                this.timer = 0;
            }
            start() { this.reset(); }
            reset() {
                super.reset();
                this.state = 'WAIT';
                this.timer = Math.floor(Math.random() * 180) + 60; 
            }
            update() {
                if (this.state === 'WAIT') {
                    this.timer--;
                    if (this.timer <= 0) this.state = 'GO';
                    if (keys['KeyQ']) { this.p2Score++; this.endGame("P1 FALSE START! P2 WINS"); }
                    if (keys['KeyP']) { this.p1Score++; this.endGame("P2 FALSE START! P1 WINS"); }
                } else if (this.state === 'GO') {
                    if (keys['KeyQ']) { this.p1Score++; this.endGame("P1 FASTEST!"); }
                    if (keys['KeyP']) { this.p2Score++; this.endGame("P2 FASTEST!"); }
                }
            }
            draw() {
                ctx.fillStyle = this.state === 'WAIT' ? '#f00' : '#0f0';
                ctx.fillRect(this.width/2 - 100, this.height/2 - 100, 200, 200);
                ctx.fillStyle = '#000';
                ctx.font = '40px Courier';
                ctx.textAlign = 'center';
                ctx.fillText(this.state, this.width/2, this.height/2 + 15);
            }
        }

        /* ==========================================================================
           GAME 7: DODGEBALL (TOP DOWN)
           ========================================================================== */
        class Dodgeball extends Engine {
            constructor() {
                super();
                this.p1Text = "P1: WASD";
                this.p2Text = "P2: ARROWS";
            }
            start() { this.reset(); }
            reset() {
                super.reset();
                this.p1 = { x: 200, y: this.height/2, r: 15, speed: 5 };
                this.p2 = { x: this.width - 200, y: this.height/2, r: 15, speed: 5 };
                this.balls = [];
                for(let i=0; i<5; i++) {
                    this.balls.push({
                        x: this.width/2, y: this.height/2, 
                        vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, r: 10
                    });
                }
            }
            update() {
                if (keys['KeyW']) this.p1.y -= this.p1.speed;
                if (keys['KeyS']) this.p1.y += this.p1.speed;
                if (keys['KeyA']) this.p1.x -= this.p1.speed;
                if (keys['KeyD']) this.p1.x += this.p1.speed;
                
                if (keys['ArrowUp']) this.p2.y -= this.p2.speed;
                if (keys['ArrowDown']) this.p2.y += this.p2.speed;
                if (keys['ArrowLeft']) this.p2.x -= this.p2.speed;
                if (keys['ArrowRight']) this.p2.x += this.p2.speed;

                this.balls.forEach(b => {
                    b.x += b.vx; b.y += b.vy;
                    if(b.x < 0 || b.x > this.width) b.vx *= -1;
                    if(b.y < 0 || b.y > this.height) b.vy *= -1;

                    if (Math.hypot(b.x - this.p1.x, b.y - this.p1.y) < b.r + this.p1.r) {
                        this.p2Score++; this.endGame("P2 WINS!");
                    }
                    if (Math.hypot(b.x - this.p2.x, b.y - this.p2.y) < b.r + this.p2.r) {
                        this.p1Score++; this.endGame("P1 WINS!");
                    }
                });
            }
            draw() {
                ctx.fillStyle = '#ff0055';
                ctx.beginPath(); ctx.arc(this.p1.x, this.p1.y, this.p1.r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#00ffff';
                ctx.beginPath(); ctx.arc(this.p2.x, this.p2.y, this.p2.r, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = '#fff';
                this.balls.forEach(b => {
                    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
                });
            }
        }

        /* ==========================================================================
           GAME 8: SPACE SHOOTER
           ========================================================================== */
        class SpaceShooter extends Engine {
            constructor() {
                super();
                this.p1Text = "P1: A/D to Move, W to Shoot";
                this.p2Text = "P2: LEFT/RIGHT, UP to Shoot";
            }
            start() { this.reset(); }
            reset() {
                super.reset();
                this.p1 = { x: this.width/2, y: this.height - 50, speed: 6, cd: 0 };
                this.p2 = { x: this.width/2, y: 50, speed: 6, cd: 0 };
                this.lasers = [];
            }
            update() {
                if (keys['KeyA']) this.p1.x -= this.p1.speed;
                if (keys['KeyD']) this.p1.x += this.p1.speed;
                if (keys['ArrowLeft']) this.p2.x -= this.p2.speed;
                if (keys['ArrowRight']) this.p2.x += this.p2.speed;

                if (this.p1.cd > 0) this.p1.cd--;
                if (keys['KeyW'] && this.p1.cd === 0) {
                    this.lasers.push({x: this.p1.x, y: this.p1.y, vy: -10, owner: 1});
                    this.p1.cd = 15;
                }
                
                if (this.p2.cd > 0) this.p2.cd--;
                if (keys['ArrowUp'] && this.p2.cd === 0) {
                    this.lasers.push({x: this.p2.x, y: this.p2.y, vy: 10, owner: 2});
                    this.p2.cd = 15;
                }

                for (let i = this.lasers.length - 1; i >= 0; i--) {
                    let l = this.lasers[i];
                    l.y += l.vy;
                    if (l.y < 0 || l.y > this.height) { this.lasers.splice(i, 1); continue; }

                    if (l.owner === 2 && Math.abs(l.x - this.p1.x) < 20 && Math.abs(l.y - this.p1.y) < 20) {
                        this.p2Score++; this.endGame("P2 WINS!");
                    }
                    if (l.owner === 1 && Math.abs(l.x - this.p2.x) < 20 && Math.abs(l.y - this.p2.y) < 20) {
                        this.p1Score++; this.endGame("P1 WINS!");
                    }
                }
            }
            draw() {
                ctx.fillStyle = '#ff0055';
                ctx.beginPath(); ctx.moveTo(this.p1.x, this.p1.y - 20); ctx.lineTo(this.p1.x - 20, this.p1.y + 20); ctx.lineTo(this.p1.x + 20, this.p1.y + 20); ctx.fill();
                
                ctx.fillStyle = '#00ffff';
                ctx.beginPath(); ctx.moveTo(this.p2.x, this.p2.y + 20); ctx.lineTo(this.p2.x - 20, this.p2.y - 20); ctx.lineTo(this.p2.x + 20, this.p2.y - 20); ctx.fill();

                ctx.fillStyle = '#fff';
                this.lasers.forEach(l => {
                    ctx.fillRect(l.x - 2, l.y - 10, 4, 20);
                });
            }
        }

        /* ==========================================================================
           GAME 9: BOX COLLECTOR
           ========================================================================== */
        class BoxCollector extends Engine {
            constructor() {
                super();
                this.p1Text = "P1: WASD";
                this.p2Text = "P2: ARROWS";
            }
            start() { this.reset(); }
            reset() {
                super.reset();
                this.p1 = { x: 100, y: 100, s: 0 };
                this.p2 = { x: 700, y: 500, s: 0 };
                this.box = this.spawn();
                this.target = 10;
            }
            spawn() {
                return { x: Math.random()*(this.width-40)+20, y: Math.random()*(this.height-40)+20 };
            }
            update() {
                let speed = 7;
                if (keys['KeyW']) this.p1.y -= speed;
                if (keys['KeyS']) this.p1.y += speed;
                if (keys['KeyA']) this.p1.x -= speed;
                if (keys['KeyD']) this.p1.x += speed;

                if (keys['ArrowUp']) this.p2.y -= speed;
                if (keys['ArrowDown']) this.p2.y += speed;
                if (keys['ArrowLeft']) this.p2.x -= speed;
                if (keys['ArrowRight']) this.p2.x += speed;

                if (Math.hypot(this.p1.x - this.box.x, this.p1.y - this.box.y) < 30) {
                    this.p1.s++; this.box = this.spawn();
                }
                if (Math.hypot(this.p2.x - this.box.x, this.p2.y - this.box.y) < 30) {
                    this.p2.s++; this.box = this.spawn();
                }

                if (this.p1.s >= this.target) { this.p1Score++; this.endGame("P1 WINS!"); }
                if (this.p2.s >= this.target) { this.p2Score++; this.endGame("P2 WINS!"); }
            }
            draw() {
                ctx.fillStyle = '#ff0055';
                ctx.fillRect(this.p1.x-15, this.p1.y-15, 30, 30);
                ctx.fillStyle = '#00ffff';
                ctx.fillRect(this.p2.x-15, this.p2.y-15, 30, 30);
                
                ctx.fillStyle = '#ffd700';
                ctx.beginPath(); ctx.arc(this.box.x, this.box.y, 10, 0, Math.PI*2); ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.fillText(`P1: ${this.p1.s}/${this.target}`, 50, 50);
                ctx.fillText(`P2: ${this.p2.s}/${this.target}`, this.width - 150, 50);
            }
        }

        /* ==========================================================================
           GAME 10: FLAPPY DUEL
           ========================================================================== */
        class FlappyDuel extends Engine {
            constructor() {
                super();
                this.p1Text = "P1: 'W' TO FLAP";
                this.p2Text = "P2: 'UP' TO FLAP";
            }
            start() { this.reset(); }
            reset() {
                super.reset();
                this.p1 = { y: 300, vy: 0, dead: false };
                this.p2 = { y: 300, vy: 0, dead: false };
                this.pipes = [];
                this.frames = 0;
            }
            update() {
                this.frames++;
                if (this.frames % 100 === 0) {
                    let gap = 150;
                    let topH = Math.random() * (this.height - gap - 100) + 50;
                    this.pipes.push({ x: this.width, top: topH, bottom: topH + gap });
                }

                if (!this.p1.dead) {
                    this.p1.vy += 0.5; this.p1.y += this.p1.vy;
                    if (keys['KeyW']) { this.p1.vy = -6; keys['KeyW'] = false; }
                }
                if (!this.p2.dead) {
                    this.p2.vy += 0.5; this.p2.y += this.p2.vy;
                    if (keys['ArrowUp']) { this.p2.vy = -6; keys['ArrowUp'] = false; }
                }

                for (let i = this.pipes.length - 1; i >= 0; i--) {
                    let p = this.pipes[i];
                    p.x -= 4;
                    if (p.x < -50) this.pipes.splice(i, 1);
                    
                    if (!this.p1.dead && (this.p1.y < 0 || this.p1.y > this.height || (p.x < 150 && p.x > 100 && (this.p1.y < p.top || this.p1.y > p.bottom)))) this.p1.dead = true;
                    if (!this.p2.dead && (this.p2.y < 0 || this.p2.y > this.height || (p.x < 150 && p.x > 100 && (this.p2.y < p.top || this.p2.y > p.bottom)))) this.p2.dead = true;
                }

                if (this.p1.dead && this.p2.dead) this.endGame("DRAW!");
                else if (this.p1.dead) { this.p2Score++; this.endGame("P2 WINS!"); }
                else if (this.p2.dead) { this.p1Score++; this.endGame("P1 WINS!"); }
            }
            draw() {
                ctx.fillStyle = '#0f0';
                this.pipes.forEach(p => {
                    ctx.fillRect(p.x, 0, 50, p.top);
                    ctx.fillRect(p.x, p.bottom, 50, this.height - p.bottom);
                });
                if (!this.p1.dead) { ctx.fillStyle = '#ff0055'; ctx.beginPath(); ctx.arc(120, this.p1.y, 15, 0, Math.PI*2); ctx.fill(); }
                if (!this.p2.dead) { ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(140, this.p2.y, 15, 0, Math.PI*2); ctx.fill(); }
            }
        }

        /* ==========================================================================
           GAME MENU & INITIALIZATION
           ========================================================================== */
        const gameLibrary = [
            { id: 'pong', name: '1. PONG DUEL', class: Pong },
            { id: 'tron', name: '2. LIGHTCYCLES', class: Tron },
            { id: 'tanks', name: '3. TANK BATTLE', class: TankBattle },
            { id: 'tug', name: '4. TUG OF WAR', class: TugOfWar },
            { id: 'snake', name: '5. SNAKE DUEL', class: SnakeDuel },
            { id: 'react', name: '6. REACTION', class: ReactionTester },
            { id: 'dodge', name: '7. DODGEBALL', class: Dodgeball },
            { id: 'space', name: '8. SPACE SHOOT', class: SpaceShooter },
            { id: 'box', name: '9. BOX COLLECTOR', class: BoxCollector },
            { id: 'flappy', name: '10. FLAPPY DUEL', class: FlappyDuel },
            // Stubs to fulfill the 20 game aesthetic requirement visually, re-routing to random for length safety
            { id: 'g11', name: '11. ASTEROIDS 2P', class: SpaceShooter },

            { id: 'g14', name: '14. PING PONG EX', class: Pong },
            { id: 'g15', name: '15. WORM HOLE', class: SnakeDuel },
            { id: 'g16', name: '16. QUICK DRAW', class: ReactionTester },
            { id: 'g17', name: '17. GEM GRAB', class: BoxCollector },
            { id: 'g18', name: '18. MASH FEST', class: TugOfWar },
            { id: 'g19', name: '19. JUMP BROS', class: FlappyDuel },
            { id: 'g20', name: '20. FINAL WAR', class: TankBattle }
        ];

        function initMenu() {
            gameLibrary.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `<div class="game-title">${game.name}</div><div>Click to Play</div>`;
                card.onclick = () => launchGame(game.class);
                menuContainer.appendChild(card);
            });
        }

        function launchGame(GameClass) {
            menuContainer.style.display = 'none';
            mainTitle.style.display = 'none';
            gameContainer.style.display = 'flex';
            
            activeGame = new GameClass();
            activeGame.start();
            p1TextEl.innerText = activeGame.p1Text;
            p2TextEl.innerText = activeGame.p2Text;
            updateScores(0, 0);
            
            if (currentAnimation) cancelAnimationFrame(currentAnimation);
            gameLoop();
        }

        backBtn.onclick = () => {
            if (currentAnimation) cancelAnimationFrame(currentAnimation);
            activeGame = null;
            gameContainer.style.display = 'none';
            menuContainer.style.display = 'grid';
            mainTitle.style.display = 'block';
        };

        initMenu();

        // Extra padding logic to simulate engine depth
        const physicsEngine = {
            gravity: 9.8,
            friction: 0.9,
            applyForces: function(obj) {
                obj.vy += this.gravity * 0.01;
                obj.vx *= this.friction;
                obj.vy *= this.friction;
            },
            checkBounds: function(obj, w, h) {
                if (obj.x > w) obj.x = w;
                if (obj.x < 0) obj.x = 0;
                if (obj.y > h) obj.y = h;
                if (obj.y < 0) obj.y = 0;
            }
        };

        const particleSystem = {
            particles: [],
            emit: function(x, y, count, color) {
                for(let i=0; i<count; i++) {
                    this.particles.push({
                        x: x, y: y,
                        vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                        life: 1.0, color: color
                    });
                }
            },
            updateAndDraw: function(ctx) {
                for(let i=this.particles.length-1; i>=0; i--) {
                    let p = this.particles[i];
                    p.x += p.vx; p.y += p.vy;
                    p.life -= 0.05;
                    if(p.life <= 0) { this.particles.splice(i, 1); continue; }
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            }
        };
        
        // Input normalizer
        const inputMap = {
            normalize: function(keyCode) {
                return keyCode.replace('Key', '').replace('Arrow', '');
            }
        };

    </script>
